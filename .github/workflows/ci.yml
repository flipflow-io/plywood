name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  GAR_NPM_URL: https://europe-west4-npm.pkg.dev/flipflow-426307/flipflow-npm/

permissions:
  contents: read
  id-token: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Compile (eslint + prettier + tsc + bundle)
        run: ./compile

      - name: Unit and simulate tests
        run: |
          PLYWOOD_PATH="build/plywood" npx mocha \
            test/datatypes/* \
            test/expression/* \
            test/external/* \
            test/helper/* \
            test/overall/* \
            test/parser/* \
            test/simulate/*

  publish:
    needs: lint-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure npm for Artifact Registry
        run: |
          cp .npmrc.example .npmrc
          npx google-artifactregistry-auth --repo-config=./.npmrc --credential-config=./.npmrc

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Compile
        run: ./compile

      - name: Check if version already published
        id: version_check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$PKG_NAME@$PKG_VERSION already published — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Artifact Registry
        if: steps.version_check.outputs.exists == 'false'
        run: npm publish
